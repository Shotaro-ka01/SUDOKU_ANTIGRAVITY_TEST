<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Sudoku</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="app-container">
        <header>
            <h1>SUDOKU</h1>
            <div class="controls">
                <div class="difficulty-selector">
                    <button class="diff-btn active" data-diff="easy">Easy</button>
                    <button class="diff-btn" data-diff="medium">Medium</button>
                    <button class="diff-btn" data-diff="hard">Hard</button>
                </div>
                <button id="new-game-btn" class="primary-btn">New Game</button>
            </div>
        </header>

        <main>
            <div class="game-board" id="sudoku-board">
                <!-- 9x9 grid will be generated by JS -->
            </div>

            <div class="numpad" id="numpad">
                <!-- 1-9 numbers and delete/hint -->
                <button class="num-btn" data-val="1">1</button>
                <button class="num-btn" data-val="2">2</button>
                <button class="num-btn" data-val="3">3</button>
                <button class="num-btn" data-val="4">4</button>
                <button class="num-btn" data-val="5">5</button>
                <button class="num-btn" data-val="6">6</button>
                <button class="num-btn" data-val="7">7</button>
                <button class="num-btn" data-val="8">8</button>
                <button class="num-btn" data-val="9">9</button>
                <button class="action-btn" id="erase-btn">Erase</button>
                <button class="action-btn" id="hint-btn">Hint</button>
            </div>
        </main>
    </div>

    <div class="overlay" id="win-overlay">
        <div class="win-modal">
            <h2>🎉 Congratulations! 🎉</h2>
            <p>You solved the puzzle!</p>
            <button id="play-again-btn" class="primary-btn">Play Again</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
