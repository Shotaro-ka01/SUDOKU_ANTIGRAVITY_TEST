<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Sudoku</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="app-container">
        <header>
            <h1>SUDOKU</h1>
            <div class="timer-container"
                style="display: flex; gap: 20px; font-size: 1.2rem; margin-bottom: 10px; color: var(--text-given);">
                <div class="time">Time: <span id="timer">00:00</span></div>
                <div class="best-time">Best: <span id="best-time">--:--</span></div>
            </div>
            <div class="controls" style="justify-content: center;">
                <button id="new-game-btn" class="primary-btn">Restart Game</button>
            </div>
        </header>

        <main>
            <div class="game-board" id="sudoku-board">
                <!-- 9x9 grid will be generated by JS -->
            </div>

            <div class="controls-area">
                <div class="numpad" id="numpad">
                    <!-- 1-9 numbers in a scrollable horizontal row -->
                    <button class="num-btn" data-val="1">1</button>
                    <button class="num-btn" data-val="2">2</button>
                    <button class="num-btn" data-val="3">3</button>
                    <button class="num-btn" data-val="4">4</button>
                    <button class="num-btn" data-val="5">5</button>
                    <button class="num-btn" data-val="6">6</button>
                    <button class="num-btn" data-val="7">7</button>
                    <button class="num-btn" data-val="8">8</button>
                    <button class="num-btn" data-val="9">9</button>
                </div>
                <div class="actions-row">
                    <button class="action-btn" id="notes-btn">Notes: Off</button>
                    <button class="action-btn" id="erase-btn">Erase</button>
                    <button class="action-btn" id="hint-btn">Hint</button>
                </div>
            </div>
        </main>
    </div>

    <!-- Start Overlay -->
    <div class="overlay show" id="start-overlay">
        <div class="win-modal" style="display: flex; flex-direction: column; gap: 20px;">
            <h2>Choose Difficulty</h2>
            <div class="start-diff-selector"
                style="display: flex; gap: 10px; justify-content: center; margin-bottom: 20px;">
                <button class="diff-btn start-diff-btn active" data-diff="easy">Easy</button>
                <button class="diff-btn start-diff-btn" data-diff="medium">Medium</button>
                <button class="diff-btn start-diff-btn" data-diff="hard">Hard</button>
            </div>
            <button id="start-game-btn" class="primary-btn" style="font-size: 1.5rem; padding: 15px 30px;">Start
                Game</button>
        </div>
    </div>

    <div class="overlay" id="win-overlay">
        <div class="win-modal">
            <h2>🎉 Congratulations! 🎉</h2>
            <p>You solved the puzzle!</p>
            <p id="final-time-display" style="font-size: 1.5rem; font-weight: bold; margin-bottom: 15px;"></p>
            <p id="new-best-time-msg"
                style="color: var(--accent); font-weight: bold; margin-bottom: 20px; display: none;">New Best Time!</p>
            <button id="play-again-btn" class="primary-btn">Play Again</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
